<script>
        const params = new URLSearchParams(window.location.search);
        const empId = params.get("id") || "EMP001";
        document.getElementById("empid").textContent = empId;

        let progress = 0;
        const bar = document.getElementById("bar");
        const percent = document.getElementById("percent");
        const statusPhase = document.getElementById("status-phase");

        // Updated with your requested smiley emoji and custom greeting text
        const statusMessages = [
            { threshold: 0, text: "😊 Please wait while we are opening your profile..." },
            { threshold: 30, text: "🔍 Fetching identity signatures..." },
            { threshold: 60, text: "⚙️ Validating EHS certifications..." },
            { threshold: 85, text: "🚀 Compiling dashboard environment..." }
        ];

        const interval = setInterval(function() {
            progress++;
            
            bar.style.width = progress + "%";
            percent.textContent = progress + "%";

            let textToShow = statusMessages[0].text;
            for (let i = 0; i < statusMessages.length; i++) {
                if (progress >= statusMessages[i].threshold) {
                    textToShow = statusMessages[i].text;
                }
            }
            statusPhase.textContent = textToShow;

            if (progress >= 100) {
                clearInterval(interval);
                
                const targetUrl = "https://script.google.com/macros/s/AKfycbyvpvj1jd5RqIk89FfOUQX1r7XUsc7ul-5sGlSk9NvjvWtR4V5ZgoBR67wofJS7_ecWMQ/exec?id=" + encodeURIComponent(empId);
                window.location.replace(targetUrl);
            }
        }, 25);
    </script>
