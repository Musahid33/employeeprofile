<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Safety Profile Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 380px;
            padding: 30px 24px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Company Logo Placeholder */
        .logo-container {
            margin-bottom: 15px;
        }

        .logo-badge {
            background: #003399;
            color: white;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            letter-spacing: 1px;
        }

        h2 {
            color: #1a202c;
            font-size: 18px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Status Icon Animations */
        .icon-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon {
            font-size: 50px;
            transition: all 0.4s ease;
        }

        .icon-loading {
            color: #3182ce;
            animation: spin 1.5s linear infinite;
        }

        .icon-success {
            color: #48bb78;
            transform: scale(1.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* QR Verified Badge */
        .qr-badge {
            background: #e6fffa;
            color: #234e52;
            border: 1px solid #b2f5ea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.5s ease;
        }

        .qr-badge.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* ID Display Box */
        .id-box {
            background: #f7fafc;
            border: 1px dashed #cbd5e0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            transition: all 0.4s ease;
        }

        .id-label {
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
            transition: color 0.4s ease;
        }

        .id-value {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
            letter-spacing: 1px;
        }

        /* Progress Bar Styling */
        .progress-container {
            background: #edf2f7;
            border-radius: 10px;
            height: 6px;
            width: 100%;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3182ce, #48bb78);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* Status & Sub-status Text */
        .status-text {
            font-size: 13px;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .sub-text {
            font-size: 11px;
            color: #718096;
            margin-bottom: 25px;
        }

        /* Footer System Info */
        hr {
            border: 0;
            border-top: 1px solid #edf2f7;
            margin-bottom: 15px;
        }

        .footer-text {
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .created-by {
            font-size: 9px;
            color: #cbd5e0;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <div class="logo-badge">EMVS</div>
        </div>
        <h2>Emvess Infraventures Pvt. Ltd.</h2>
        <div class="subtitle">Employee Safety Profile</div>

        <div class="icon-container">
            <i id="statusIcon" class="fa-solid fa-circle-notch icon-loading"></i>
        </div>

        <div>
            <div id="qrBadge" class="qr-badge">
                <i class="fa-solid fa-circle-check"></i> QR VERIFIED
            </div>
        </div>

        <div class="id-box" id="idBox">
            <div class="id-label" id="idLabel">Verifying Identity...</div>
            <div class="id-value" id="idValue">EMP001</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="status-text" id="statusText">
            <i class="fa-solid fa-sync fa-spin" style="color:#3182ce; font-size: 11px;"></i> Connecting to secure servers...
        </div>
        <div class="sub-text" id="subText">Please wait while we validate credentials.</div>

        <hr>

        <div class="footer-text">
            <i class="fa-solid fa-lock"></i> Secure System Interconnect | EMVESS SYSTEM EHS
        </div>
        <div class="created-by">Created By - Musahid</div>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const subText = document.getElementById('subText');
        const qrBadge = document.getElementById('qrBadge');
        const idLabel = document.getElementById('idLabel');
        const idBox = document.getElementById('idBox');

        // Simulation Timeline
        
        // Step 1: Initial load state (0.5 seconds)
        setTimeout(() => {
            progressBar.style.width = '30%';
            statusText.innerHTML = '<i class="fa-solid fa-download" style="color:#3182ce;"></i> Fetching secure records...';
            subText.innerText = 'Retrieving profile from main EHS database.';
        }, 800);

        // Step 2: Mid-way verification (2.3 seconds)
        setTimeout(() => {
            progressBar.style.width = '65%';
            statusText.innerHTML = '<i class="fa-solid fa-id-card" style="color:#3182ce;"></i> Validating Safety Logs...';
            subText.innerText = 'Cross-referencing active credentials and certifications.';
        }, 2300);

        // Step 3: Exact Success Completion at 4.5 seconds (4500ms)
        setTimeout(() => {
            // Full Progress Bar
            progressBar.style.width = '100%';
            
            // Stop loader and show green success check
            statusIcon.className = 'fa-solid fa-circle-check status-icon icon-success';
            
            // Show QR VERIFIED Badge (Smooth opacity transition)
            qrBadge.classList.add('show');
            
            // Update Identity container design to green success state
            idLabel.innerText = 'Verified Employee ID';
            idLabel.style.color = '#38a169';
            idBox.style.borderColor = '#48bb78';
            idBox.style.background = '#f0fff4';
            
            // Final Status Texts
            statusText.innerHTML = '<i class="fa-solid fa-shield-halved" style="color:#48bb78;"></i> Verification Successful';
            subText.innerText = 'Identity validated and ecosystem sync complete.';
        }, 4500);
    </script>
</body>
</html>
