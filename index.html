<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Safety Profile</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#003366,#0066cc);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
width:380px;
max-width:92%;
background:#fff;
border-radius:20px;
padding:35px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.3);
animation:fade .8s;
}

@keyframes fade{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
width:90px;
margin-bottom:15px;
}

.company{
font-size:24px;
font-weight:bold;
color:#003366;
margin-bottom:5px;
}

.title{
font-size:20px;
font-weight:600;
color:#444;
margin-bottom:20px;
}

.tick{
width:90px;
height:90px;
border-radius:50%;
background:#22c55e;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
color:white;
font-size:48px;
animation:pulse 1.2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

.verify{
color:#22c55e;
font-weight:bold;
font-size:22px;
margin:15px 0;
}

.idbox{
background:#f5f8fc;
border-radius:12px;
padding:15px;
margin:20px 0;
}

.idtitle{
font-size:14px;
color:#777;
}

.id{
font-size:30px;
font-weight:bold;
color:#005792;
margin-top:5px;
}

.fetch{
font-size:17px;
font-weight:600;
margin-bottom:15px;
color:#003366;
}

.progress{
height:12px;
background:#ddd;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c853,#00acc1);
}

.percent{
margin-top:12px;
font-weight:bold;
color:#003366;
font-size:20px;
}

.loading{
margin-top:15px;
color:#666;
}

.footer{
margin-top:25px;
font-size:13px;
color:#888;
}
</style>

</head>

<body>

<div class="card">

<img class="logo"
src="https://drive.google.com/uc?export=view&id=1xymrOtXSB_ziOoMZolLJBj9pXKoyTC4I"
alt="Company Logo">

<div class="company">
Emvess Infraventures Pvt. Ltd.
</div>

<div class="title">
Employee Safety Profile
</div>

<div class="tick">✓</div>

<div class="verify">
QR VERIFIED
</div>

<div class="idbox">
<div class="idtitle">Employee ID</div>
<div class="id" id="empid">Loading...</div>
</div>

<div class="fetch">
🔍 Fetching Employee Details...
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="percent" id="percent">0%</div>

<div class="loading">
Please wait while your profile is being prepared...
</div>

<div class="footer">
🔒 Secure Connection | Your Safety is Our Priority
</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const empId = params.get("id") || "EMP001";

document.getElementById("empid").textContent = empId;

let progress = 0;

const bar = document.getElementById("bar");
const percent = document.getElementById("percent");

const interval = setInterval(function(){

progress++;

bar.style.width = progress + "%";
percent.textContent = progress + "%";

if(progress >= 100){

clearInterval(interval);

window.location.replace(
"https://script.google.com/macros/s/AKfycbyvpvj1jd5RqIk89FfOUQX1r7XUsc7ul-5sGlSk9NvjvWtR4V5ZgoBR67wofJS7_ecWMQ/exec?id=" + encodeURIComponent(empId)
);

}

},20);

</script>

</body>
</html>
