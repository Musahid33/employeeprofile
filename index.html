<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Safety Profile Verification</title>
    
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-green: #10b981;
            --accent-blue: #2563eb;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--accent-blue), #4f46e5);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
            top: 20%;
            left: 25%;
            animation: floatGlow 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        .card {
            position: relative;
            width: 400px;
            max-width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 2;
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }

        .logo {
            width: 95px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        /* Logo link broken hone par display standard rakhne ke liye fallback class */
        .logo:not([src]), .logo[src=""] {
            display: none;
        }

        .company {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        .verification-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
        }

        .tick-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            border: 2px dashed rgba(16, 185, 129, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateOuter 12s linear infinite;
        }

        @keyframes rotateOuter {
            100% { transform: rotate(360deg); }
        }

        .tick-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 38px;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            animation: pulseScale 2s ease-in-out infinite;
        }
