<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Safety Profile Verification</title>
    
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-green: #10b981;
            --accent-blue: #2563eb;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, var(--accent-blue), #4f46e5);
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 1;
            top: 20%;
            left: 25%;
            animation: floatGlow 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow {
            0% { transform: translateY(0px) scale(1); }
            100% { transform: translateY(20px) scale(1.1); }
        }

        .card {
            position: relative;
            width: 400px;
            max-width: 100%;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 2;
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container {
            margin-bottom: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }

        .logo {
            width: 95px;
            height: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .logo:not([src]), .logo[src=""] {
            display: none;
        }

        .company {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .title {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 25px;
        }

        .verification-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 15px auto;
        }

        .tick-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.1);
            border: 2px dashed rgba(16, 185, 129, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotateOuter 12s linear infinite;
        }

        @keyframes rotateOuter {
            100% { transform: rotate(360deg); }
        }

        .tick-inner {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 38px;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
            animation: pulseScale 2s ease-in-out infinite;
        }

        @keyframes pulseScale {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 12px 24px rgba(16, 185, 129, 0.4); }
        }

        .verify-badge {
            color: var(--accent-green);
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.12);
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 25px;
        }

        .id-box {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .id-box::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            animation: shimmer 2.5s infinite;
        }

        @keyframes shimmer {
            100% { left: 100%; }
        }

        .id-label {
            font-size: 12px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .id-value {
            font-size: 26px;
            font-weight: 700;
            color: #e2e8f0;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .status-container {
            margin-top: 10px;
        }

        .status-text {
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4px;
        }

        .progress-track {
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-blue), #3b82f6, var(--accent-green));
            background-size: 200% auto;
            border-radius: 10px;
        }

        .info-note {
            margin-top: 16px;
            font-size: 12px;
            color: #64748b;
        }

        .footer-badge {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #475569;
            font-weight: 500;
        }

        .footer-badge svg {
            fill: #475569;
        }

        .creator-credit {
            margin-top: 12px;
            font-size: 11px;
            color: #475569;
            letter-spacing: 0.5px;
            font-weight: 400;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="card">
        <div class="logo-container">
            <img class="logo" 
                 src="https://drive.google.com/uc?export=view&id=1xymrOtXSB_ziOoMZolLJBj9pXKoyTC4I" 
                 alt="Emvess Logo">
        </div>

        <div class="company">Emvess Infraventures Pvt. Ltd.</div>
        <div class="title">Employee Safety Profile</div>

        <div class="verification-wrapper">
            <div class="tick-circle"></div>
            <div class="tick-inner">✓</div>
        </div>

        <div>
            <span class="verify-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M23 12l-2.44-2.79.34-3.69-3.61-.82-1.89-3.2L12 2.96 8.6 1.5 6.71 4.7l-3.61.81.34 3.68L1 12l2.44 2.79-.34 3.69 3.61.82 1.89 3.2 3.4-1.47 3.4 1.46 1.89-3.2 3.61-.82-.34-3.69L23 12zm-12.91 4.72l-3.8-3.81 1.48-1.48 2.32 2.33 5.85-5.87 1.48 1.48-7.33 7.35z"/></svg>
                QR VERIFIED
            </span>
        </div>

        <div class="id-box">
            <div class="id-label">Verified Employee ID</div>
            <div class="id-value" id="empid">Parsing...</div>
        </div>

        <div class="status-container">
            <div class="status-text">
                <span id="status-phase">🔒 Initializing secure handshake...</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="bar"></div>
            </div>
            <div class="info-note">
                Establishing end-to-end encrypted link with ecosystem servers.
            </div>
        </div>

        <div class="footer-badge">
            <svg width="14" height="14" viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
            SECURE SYSTEM INTERCONNECT | EMVESS SYSTEM EHS
        </div>

        <div class="creator-credit">
            Created By - Musahid
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const empId = params.get("id") || "EMP001";
        document.getElementById("empid").textContent = empId;

        let progress = 0;
        const bar = document.getElementById("bar");
        const percent = document.getElementById("percent");
        const statusPhase = document.getElementById("status-phase");

        const statusMessages = [
            { threshold: 0, text: "🔒 Initializing secure link..." },
            { threshold: 25, text: "🔍 Fetching identity signatures..." },
            { threshold: 55, text: "⚙️ Validating EHS certifications..." },
            { threshold: 80, text: "🚀 Compiling dashboard environment..." }
        ];

        const interval = setInterval(function() {
            progress++;
            
            bar.style.width = progress + "%";
            percent.textContent = progress + "%";

            let textToShow = statusMessages[0].text;
            for (let i = 0; i < statusMessages.length; i++) {
                if (progress >= statusMessages[i].threshold) {
                    textToShow = statusMessages[i].text;
                }
            }
            statusPhase.textContent = textToShow;

            if (progress >= 100) {
                clearInterval(interval);
                
                const targetUrl = "https://script.google.com/macros/s/AKfycbyvpvj1jd5RqIk89FfOUQX1r7XUsc7ul-5sGlSk9NvjvWtR4V5ZgoBR67wofJS7_ecWMQ/exec?id=" + encodeURIComponent(empId);
                window.location.replace(targetUrl);
            }
        }, 25);
    </script>
</body>
</html>
