<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Safety Profile Verification</title>
    <!-- FontAwesome Icons ke liye -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 380px;
            padding: 30px 24px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.03);
        }

        /* Company Logo Placeholders */
        .logo-container {
            margin-bottom: 15px;
        }

        .logo-badge {
            background: #003399;
            color: white;
            font-weight: bold;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            letter-spacing: 1px;
        }

        h2 {
            color: #1a202c;
            font-size: 18px;
            margin-bottom: 4px;
            font-weight: 700;
        }

        .subtitle {
            color: #718096;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 600;
        }

        /* Status Icon Animations */
        .icon-container {
            position: relative;
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon {
            font-size: 50px;
            transition: all 0.4s ease;
        }

        .icon-loading {
            color: #3182ce;
            animation: spin 1.5s linear infinite;
        }

        .icon-success {
            color: #48bb78;
            transform: scale(1.1);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* QR Verified Badge */
        .qr-badge {
            background: #e6fffa;
            color: #234e52;
            border: 1px solid #b2f5ea;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .qr-badge.show {
            opacity: 1;
        }

        /* ID Display Box */
        .id-box {
            background: #f7fafc;
            border: 1px dashed #cbd5e0;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .id-label {
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .id-value {
            font-size: 20px;
            font-weight: 700;
            color: #2d3748;
            letter-spacing: 1px;
        }

        /* Progress Bar Styling */
        .progress-container {
            background: #edf2f7;
            border-radius: 10px;
            height: 6px;
            width: 100%;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .progress-bar {
            background: linear-gradient(90deg, #3182ce, #48bb78);
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        /* Status & Sub-status Text */
        .status-text {
            font-size: 13px;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .sub-text {
            font-size: 11px;
            color: #718096;
            margin-bottom: 25px;
        }

        /* Footer System Info */
        hr {
            border: 0;
            border-top: 1px solid #edf2f7;
            margin-bottom: 15px;
        }

        .footer-text {
            font-size: 10px;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .created-by {
            font-size: 9px;
            color: #cbd5e0;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Company Header -->
        <div class="logo-container">
            <div class="logo-badge">EMVS</div>
        </div>
        <h2>Emvess Infraventures Pvt. Ltd.</h2>
        <div class="subtitle">Employee Safety Profile</div>

        <!-- Dynamic Icon Area -->
        <div class="icon-container">
            <i id="statusIcon" class="fa-solid fa-circle-notch icon-loading"></i>
        </div>

        <!-- Verified Badge (Hidden initially) -->
        <div>
            <div id="qrBadge" class="qr-badge">
                <i class="fa-solid fa-circle-check"></i> QR VERIFIED
            </div>
        </div>

        <!-- Employee ID Box -->
        <div class="id-box" id="idBox">
            <div class="id-label" id="idLabel">Verifying Identity...</div>
            <div class="id-value" id="idValue">EMP001</div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Dynamic Messages -->
        <div class="status-text" id="statusText">Connecting to secure servers...</div>
        <div class="sub-text" id="subText">Please wait while we validate credentials.</div>

        <hr>

        <!-- Footer -->
        <div class="footer-text">
            <i class="fa-solid fa-lock"></i> Secure System Interconnect | EMVESS SYSTEM EHS
        </div>
        <div class="created-by">Created By - Musahid</div>
    </div>

    <!-- Interface Controller Logic -->
    <script>
        const progressBar = document.getElementById('progressBar');
        const statusIcon = document.getElementById('statusIcon');
        const statusText = document.getElementById('statusText');
        const subText = document.getElementById('subText');
        const qrBadge = document.getElementById('qrBadge');
        const idLabel = document.getElementById('idLabel');
        const idBox = document.getElementById('idBox');

        // Simulation Steps
        setTimeout(() => {
            // Step 1: Fetching Data
            progressBar.style.width = '35%';
            statusText.innerHTML = '<i class="fa-solid fa-download" style="color:#3182ce;"></i> Fetching data successfully...';
            subText.innerText = 'Retrieving records from the main EHS database.';
        }, 1200);

        setTimeout(() => {
            // Step 2: Validating Employee ID
            progressBar.style.width = '70%';
            statusText.innerHTML = '<i class="fa-solid fa-id-card" style="color:#3182ce;"></i> Employee ID Verified...';
            subText.innerText = 'Cross-referencing safety logs and certifications.';
            idLabel.innerText = 'Verified Employee ID';
            idBox.style.borderColor = '#48bb78';
            idBox.style.background = '#f0fff4';
        }, 2800);

        setTimeout(() => {
            // Step 3: Success Completion
            progressBar.style.width = '100%';
            
            // Icon transition to Success Checkmark
            statusIcon.className = 'fa-solid fa-circle-check icon-success';
            
            // Show QR Badge
            qrBadge.classList.add('show');
            
            statusText.innerHTML = '<i class="fa-solid fa-bolt" style="color:#48bb78;"></i> Redirecting to profile dashboard...';
            subText.innerText = 'Connecting securely with ecosystem servers.';
        }, 4500);
    </style>
</body>
</html>
