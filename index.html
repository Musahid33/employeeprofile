<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Safety Profile Verification</title>
    
    <style>
        :root {
            --primary-color: #f1f5f9;
            --accent-green: #059669;
            --text-dark: #0f172a;
            --text-muted: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: radial-gradient(circle at 50% 50%, #e0e7ff 0%, #f1f5f9 100%);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; padding: 20px;
        }

        .card {
            width: 400px; max-width: 100%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 24px; padding: 40px 30px; text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        .logo { width: 95px; margin-bottom: 18px; border-radius: 8px; }
        .company { font-size: 22px; font-weight: 700; color: var(--text-dark); margin-bottom: 25px; }
        .progress-track { height: 8px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        .progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #2563eb, #10b981); transition: width 0.1s linear; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .custom-welcome-note { font-size: 13px; color: #4f46e5; font-weight: 600; animation: blink 1.5s infinite; }
        .creator-credit { margin-top: 20px; font-size: 11px; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <img class="logo" src="Emvs LOGO.jpg" alt="Logo">
        <div class="company">Emvess Infraventures Pvt. Ltd.</div>
        <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
        <div id="status-phase" style="font-size: 14px; font-weight: 600; color: #475569; margin-bottom: 10px;">Initializing...</div>
        <div class="custom-welcome-note" id="welcome-note">😊 Please wait while we are opening your profile...</div>
        <div class="creator-credit">Emveess Safety Mngt. System - TSL Site | Created By- Musahid | © 2026</div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const empId = params.get("id") || "EMP001";
        
        let progress = 0;
        const bar = document.getElementById("bar");
        const statusPhase = document.getElementById("status-phase");
        const welcomeNote = document.getElementById("welcome-note");

        function updateProgress() {
            if (progress < 95) {
                progress++;
                bar.style.width = progress + "%";
                statusPhase.textContent = "Loading... " + progress + "%";
                setTimeout(updateProgress, 40);
            } else if (progress === 95) {
                // 95% par rukna
                statusPhase.textContent = "Validating...";
                setTimeout(() => {
                    progress = 100;
                    bar.style.width = "100%";
                    statusPhase.textContent = "✅ Verification Complete!";
                    welcomeNote.textContent = "😊 You are now entering your profile...";
                    welcomeNote.style.animation = "none";
                    welcomeNote.style.color = "#059669";
                    
                    // 400ms ke baad redirect
                    setTimeout(() => {
                        window.location.href = "https://script.google.com/macros/s/AKfycbyvpvj1jd5RqIk89FfOUQX1r7XUsc7ul-5sGlSk9NvjvWtR4V5ZgoBR67wofJS7_ecWMQ/exec?id=" + encodeURIComponent(empId);
                    }, 400);
                }, 1500); // 95% par 1.5 second ka hold
            }
        }

        updateProgress();
    </script>
</body>
</html>
