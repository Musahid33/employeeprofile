<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #555; }
    </style>
</head>
<body>
    <p>Loading profile...</p>

    <script>
        var globalUrl = "https://script.google.com/macros/s/AKfycbx3Pyel1QtuCxXbSg1i3FcXPvihTWzPeEP9TH7LrJRWLVLrcFBKOXz-3OBz5c4xYHzJPg/exec";
        
        var urlParams = new URLSearchParams(window.location.search);
        var qrEmpId = urlParams.get('id');
        
        if(qrEmpId) {
            // .replace() method purane page ko history se hata kar turant redirect karta hai
            window.location.replace(globalUrl + "?id=" + encodeURIComponent(qrEmpId.toUpperCase()));
        } else {
            // Agar ID na ho toh user ko manual search ke liye portal par roko
            window.location.href = "https://musahid33.github.io/employeeprofile/search.html";
        }
    </script>
</body>
</html>
