        body {

            min-height: 100vh;

            padding: 35px 28px;

            position: relative;

        /* Company Logo Badge */
        .logo-container {
            margin-bottom: 18px;
        }

        .logo-badge {
            background: #003399;
            color: white;
            font-weight: 700;
            padding: 6px 16px;

        }

        .subtitle {

            font-size: 11px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-weight: 600;
        }

        /* Professional Loader and Status Icon */
        .icon-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-icon {
            font-size: 56px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .icon-loading {
            color: #003399;
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        }

        .icon-success {
            color: #10b981;
            transform: scale(1.05);
            filter: drop-shadow(0 4px 10px rgba(16, 185, 129, 0.2));
        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
